<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChatVtx | Digital Clone</title>
    <style>
        :root {
            --main: #00ff41;
            --bg: #000000;
            --panel: #0a0a0a;
            --error: #ff4141;
            --thinking: #00e5ff;
        }

        body, html {
            height: 100dvh; margin: 0; padding: 0;
            background: var(--bg); color: #e6edf3;
            font-family: 'Consolas', monospace; overflow: hidden;
            position: fixed; width: 100%;
        }

        .wrapper { display: flex; height: 100dvh; width: 100vw; position: relative; }

        /* САЙДБАР */
        .sidebar {
            width: 250px; background: var(--panel); border-right: 1px solid var(--main);
            display: flex; flex-direction: column; align-items: center; padding: 20px 10px;
            transition: 0.3s; z-index: 1000;
        }

        @keyframes rainbow-glow {
            0% { border-color: #00ff41; box-shadow: 0 0 15px #00ff41; }
            33% { border-color: #00e5ff; box-shadow: 0 0 15px #00e5ff; }
            66% { border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; }
            100% { border-color: #00ff41; box-shadow: 0 0 15px #00ff41; }
        }

        @keyframes speaking-pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--main); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px var(--main); }
            100% { transform: scale(1); box-shadow: 0 0 10px var(--main); }
        }

        .avatar {
            width: 90px; height: 90px; border-radius: 50%;
            border: 3px solid var(--main); margin-bottom: 10px; margin-top: 20px;
            object-fit: cover; animation: rainbow-glow 4s linear infinite;
            transition: 0.3s;
        }

        .avatar.speaking { animation: speaking-pulse 0.5s ease-in-out infinite !important; border-color: var(--main); }
        .avatar.thinking { border-color: var(--thinking); box-shadow: 0 0 25px var(--thinking); animation: none; filter: hue-rotate(180deg); }

        .tts-toggle {
            margin: 15px 0; cursor: pointer; color: var(--main); font-size: 0.8rem;
            border: 1px dashed var(--main); padding: 8px 15px; border-radius: 20px;
            transition: 0.3s; width: 80%; text-align: center;
        }
        .tts-toggle.active { background: var(--main); color: #000; border-style: solid; box-shadow: 0 0 10px var(--main); }

        .toggle-btn {
            position: absolute; top: 15px; left: 15px;
            color: var(--main); cursor: pointer; font-size: 0.9rem;
            border: 1px solid var(--main); padding: 5px 12px;
            background: var(--bg); z-index: 1100; border-radius: 20px;
        }

        .main-content { flex: 1; display: flex; flex-direction: column; background: #000; min-width: 0; height: 100dvh; }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 25px;
            color: var(--main); background: #000; padding-top: 70px;
            scrollbar-width: thin; scrollbar-color: var(--main) #000;
        }

        .input-area {
            display: flex; border-top: 1px solid #1a1a1a;
            background: #0a0a0a; padding: 15px; gap: 10px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        input#user-input {
            flex: 1; background: #000; border: 1px solid #333;
            color: #fff; padding: 12px 20px; outline: none;
            font-family: inherit; font-size: 16px; border-radius: 25px;
        }

        .btn-ui {
            background: transparent; color: var(--main);
            border: 1px solid var(--main); padding: 0 20px;
            cursor: pointer; font-weight: bold; border-radius: 25px;
            transition: 0.2s;
        }
        .btn-ui:active { background: var(--main); color: #000; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -260px; height: 100dvh; box-shadow: 10px 0 20px rgba(0,0,0,0.8); }
            .sidebar.active { left: 0; }
        }

        @media (min-width: 769px) { .sidebar.hidden { margin-left: -250px; border: none; } }

        .status-bar { font-size: 0.7rem; color: var(--main); text-align: center; margin-bottom: auto; line-height: 1.6; }
        .auth-area { width: 90%; display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        .key-input { width: 100%; background: #000; border: 1px solid #333; color: var(--main); padding: 10px; border-radius: 25px; margin-bottom: 10px; text-align: center; outline: none; }
        .btn-download { border: 1px solid var(--main); color: var(--main) !important; text-align: center; width: 100%; padding: 10px; text-decoration: none; border-radius: 25px; font-size: 0.8rem; }

        .user-label { color: #888; font-size: 0.8rem; margin-bottom: 4px; }
        .ai-label { color: var(--main); font-size: 0.8rem; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="toggle-btn" id="t-btn" onclick="toggleSidebar()">[ < ]</div>

    <div class="wrapper">
        <div class="sidebar" id="sidebar">
            <img src="/static/ai_avatar.png" class="avatar" id="main-avatar" alt="Face">
            <h1 style="font-size: 1.2rem; color: var(--main); margin: 5px 0 10px 0;">ChatVtx</h1>

            <div id="tts-btn" class="tts-toggle" onclick="toggleTTS()">VOICE: OFF</div>

            <div class="status-bar">
                STATUS: ONLINE<br>MODEL: 8B VISION<br>ENC: DIGITAL CLONE
            </div>

            <div class="auth-area">
                <input type="password" id="access-key" class="key-input" placeholder="КЛЮЧ АКТИВАЦИИ" value="2056">
                <a href="/download/chatvtx.zip" class="btn-download">DOWNLOAD PROJECT</a>
            </div>
        </div>

        <div class="main-content">
            <div id="chat-window"></div>
            <div class="input-area">
                <button class="btn-ui" onclick="clearChat()">CLS</button>
                <input type="text" id="user-input" placeholder="Команда..." autocomplete="off">
                <button class="btn-ui" id="run-btn" onclick="send()">RUN</button>
            </div>
        </div>
    </div>

    <script>
        let ttsActive = false;
        let userName = "Гость";
        const avatar = document.getElementById('main-avatar');

        async function toggleTTS() {
            ttsActive = !ttsActive;
            const btn = document.getElementById('tts-btn');
            btn.innerHTML = ttsActive ? 'VOICE: ON' : 'VOICE: OFF';
            btn.classList.toggle('active');

            if (!ttsActive) {
                // 1. Останавливаем браузерный синтез (заглушка)
                window.speechSynthesis.cancel();
                avatar.classList.remove('speaking');

                // 2. МГНОВЕННЫЙ СТОП СЕРВЕРНОЙ ОЗВУЧКИ
                try {
                    await fetch('/stop', { method: 'POST' });
                } catch (e) { console.error("Stop signal failed"); }
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('t-btn');
            const isMobile = window.innerWidth <= 768;

            if (isMobile) {
                sidebar.classList.toggle('active');
                btn.innerHTML = sidebar.classList.contains('active') ? '[ > ]' : '[ < ]';
            } else {
                sidebar.classList.toggle('hidden');
                btn.innerHTML = sidebar.classList.contains('hidden') ? '[ > ]' : '[ < ]';
            }
        }

        function clearChat() {
            document.getElementById('chat-window').innerHTML = '';
            fetch('/stop', { method: 'POST' }); // Останавливаем голос при очистке
            avatar.classList.remove('speaking', 'thinking');
        }

        async function send() {
            const input = document.getElementById('user-input');
            const keyInput = document.getElementById('access-key');
            const chatWin = document.getElementById('chat-window');

            if(!input.value.trim()) return;

            const text = input.value;
            chatWin.innerHTML += `
                <div style="margin-bottom: 15px;">
                    <div class="user-label">>> ${userName}</div>
                    <div style="color: #fff;">${text}</div>
                </div>`;

            input.blur();
            input.value = '';
            chatWin.scrollTop = chatWin.scrollHeight;

            avatar.classList.add('thinking');

            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('active');
                document.getElementById('t-btn').innerHTML = '[ < ]';
            }

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    // ПЕРЕДАЕМ СОСТОЯНИЕ ТУМБЛЕРА НА СЕРВЕР
                    body: JSON.stringify({
                        text: text,
                        key: keyInput.value,
                        voice_enabled: ttsActive
                    })
                });

                const data = await response.json();
                avatar.classList.remove('thinking');

                if(data.name) userName = data.name;

                chatWin.innerHTML += `
                    <div style="margin-bottom: 25px;">
                        <div class="ai-label">● МАЛЫШКА</div>
                        <div style="border-left: 2px solid var(--main); padding-left: 12px;">${data.reply}</div>
                    </div>`;

                // Анимация аватара, если голос включен
                if (ttsActive) {
                    avatar.classList.add('speaking');
                    // Таймер примерного времени речи (Piper не дает callback конца через aplay)
                    setTimeout(() => avatar.classList.remove('speaking'), data.reply.length * 60);
                }

            } catch (e) {
                avatar.classList.remove('thinking');
                chatWin.innerHTML += `<div style="color: var(--error); margin: 10px 0;">! КРИТИЧЕСКАЯ ОШИБКА СВЯЗИ</div>`;
            }
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });

        if (window.innerWidth > 768) document.getElementById('user-input').focus();
    </script>
</body>
</html>
